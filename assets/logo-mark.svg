<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="x-harness mark">
  <title>x-harness mark</title>

  <defs>
    <linearGradient id="xh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E17"/>
      <stop offset="0.6" stop-color="#0E1422"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <radialGradient id="xh-glow" cx="0.85" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#F59E0B" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <pattern id="xh-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="0.5" stroke-opacity="0.5"/>
    </pattern>

    <linearGradient id="xh-mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>

    <radialGradient id="xh-pip" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#xh-bg)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#xh-grid)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#xh-glow)"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="510" height="510" rx="95" ry="95" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- Centered mark: rounded card with "x" + status pip -->
  <g transform="translate(96, 96)">
    <!-- Rounded card frame -->
    <rect x="0" y="0" width="320" height="320" rx="72" ry="72" fill="url(#xh-mark)" stroke="#334155" stroke-width="3"/>
    <!-- Top inner highlight -->
    <path d="M 60 4 L 260 4" stroke="#475569" stroke-width="2" stroke-opacity="0.7" stroke-linecap="round"/>
    <!-- The "x" -->
    <g stroke-linecap="round">
      <line x1="100" y1="100" x2="220" y2="220" stroke="#F1F5F9" stroke-width="30"/>
      <line x1="220" y1="100" x2="100" y2="220" stroke="#F1F5F9" stroke-width="30"/>
    </g>
    <!-- Status pip (green) -->
    <circle cx="288" cy="32" r="32" fill="url(#xh-pip)"/>
    <circle cx="288" cy="32" r="20" fill="#22C55E"/>
    <circle cx="282" cy="26" r="6.5" fill="#BBF7D0"/>
  </g>
</svg>
