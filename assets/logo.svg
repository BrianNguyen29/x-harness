<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="x-harness logo">
  <title>x-harness — completion is admitted, not claimed</title>
  <desc>Large horizontal logo lockup for x-harness: a verification harness for AI-agent workflows.</desc>

  <defs>
    <!-- Background -->
    <linearGradient id="xh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E17"/>
      <stop offset="0.6" stop-color="#0E1422"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <radialGradient id="xh-glow" cx="0.9" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#F59E0B" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="xh-glow2" cx="0.05" cy="0.95" r="0.5">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>

    <pattern id="xh-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="0.5" stroke-opacity="0.5"/>
    </pattern>

    <!-- Mark fill -->
    <linearGradient id="xh-mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>

    <!-- Status pip glow -->
    <radialGradient id="xh-pip" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#xh-bg)"/>
  <rect width="1200" height="360" fill="url(#xh-grid)"/>
  <rect width="1200" height="360" fill="url(#xh-glow)"/>
  <rect width="1200" height="360" fill="url(#xh-glow2)"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="1199" height="359" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- ============ LOGO MARK (large) ============ -->
  <g transform="translate(72, 72)">
    <!-- Soft shadow -->
    <ellipse cx="108" cy="232" rx="96" ry="10" fill="#000" fill-opacity="0.45"/>
    <!-- Rounded card frame -->
    <rect x="0" y="0" width="216" height="216" rx="44" ry="44" fill="url(#xh-mark)" stroke="#334155" stroke-width="2.5"/>
    <!-- Top inner highlight -->
    <path d="M 40 2.5 L 176 2.5" stroke="#475569" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round"/>
    <!-- The "x" — bold crossing diagonals -->
    <g stroke-linecap="round">
      <line x1="68" y1="68" x2="148" y2="148" stroke="#F1F5F9" stroke-width="20"/>
      <line x1="148" y1="68" x2="68" y2="148" stroke="#F1F5F9" stroke-width="20"/>
    </g>
    <!-- Status pip (green) — large, with glow -->
    <circle cx="194" cy="22" r="22" fill="url(#xh-pip)"/>
    <circle cx="194" cy="22" r="14" fill="#22C55E"/>
    <circle cx="190" cy="18" r="4.5" fill="#BBF7D0"/>
  </g>

  <!-- ============ WORDMARK (massive) ============ -->
  <g transform="translate(340, 0)">
    <!-- "x-harness" — very large, prominent -->
    <text x="0" y="208"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
          font-size="148" font-weight="900" letter-spacing="-6" fill="#F1F5F9">
      <tspan fill="#F59E0B">x</tspan><tspan fill="#F1F5F9">-harness</tspan>
    </text>

    <!-- Mantra below wordmark -->
    <g transform="translate(4, 252)">
      <text x="0" y="0"
            font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace"
            font-size="17" font-weight="600" letter-spacing="2.5" fill="#64748B">[</text>
      <text x="18" y="0"
            font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace"
            font-size="17" font-weight="600" letter-spacing="4" fill="#CBD5E1">COMPLETION  IS  ADMITTED,  NOT  CLAIMED</text>
      <text x="654" y="0"
            font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace"
            font-size="17" font-weight="600" letter-spacing="2.5" fill="#64748B">]</text>
    </g>
  </g>

  <!-- ============ Bottom-right CLI stamp ============ -->
  <g transform="translate(1120, 332)">
    <text x="0" y="0" text-anchor="end"
          font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Consolas, monospace"
          font-size="13" font-weight="500" fill="#475569" letter-spacing="0.5">$ xh verify →</text>
  </g>
</svg>
