<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="x-harness — completion is admitted, not claimed">
  <title>x-harness — completion is admitted, not claimed</title>
  <desc>Wide README hero banner for x-harness: a lightweight, file-first verification harness for AI-agent workflows.</desc>

  <defs>
    <!-- Background gradient: midnight to deep slate -->
    <linearGradient id="xh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E17"/>
      <stop offset="0.55" stop-color="#0E1422"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <!-- Warm radial glow (top-right) -->
    <radialGradient id="xh-glow" cx="0.86" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#F59E0B" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Cool secondary glow (bottom-left) -->
    <radialGradient id="xh-glow2" cx="0.08" cy="0.95" r="0.5">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle grid pattern -->
    <pattern id="xh-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1F2937" stroke-width="0.5" stroke-opacity="0.55"/>
    </pattern>

    <!-- Mark fill (subtle inner gradient) -->
    <linearGradient id="xh-mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>

    <!-- Card preview fill -->
    <linearGradient id="xh-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#162033"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Status pip glow -->
    <radialGradient id="xh-pip" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>

    <!-- Card shadow -->
    <radialGradient id="xh-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1280" height="320" fill="url(#xh-bg)"/>
  <rect width="1280" height="320" fill="url(#xh-grid)"/>
  <rect width="1280" height="320" fill="url(#xh-glow)"/>
  <rect width="1280" height="320" fill="url(#xh-glow2)"/>

  <!-- Subtle outer border -->
  <rect x="0.5" y="0.5" width="1279" height="319" rx="0" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- ============ LOGO MARK (left) ============ -->
  <g transform="translate(64, 60)">
    <!-- Soft shadow under mark -->
    <ellipse cx="48" cy="106" rx="44" ry="6" fill="#000" fill-opacity="0.45"/>
    <!-- Rounded card frame -->
    <rect x="0" y="0" width="96" height="96" rx="20" ry="20" fill="url(#xh-mark)" stroke="#334155" stroke-width="1.5"/>
    <!-- Top inner highlight -->
    <path d="M 18 1.5 L 78 1.5" stroke="#475569" stroke-width="1" stroke-opacity="0.7" stroke-linecap="round"/>
    <!-- The "x" — two crossing diagonal bars -->
    <g stroke-linecap="round">
      <line x1="30" y1="30" x2="66" y2="66" stroke="#F1F5F9" stroke-width="9"/>
      <line x1="66" y1="30" x2="30" y2="66" stroke="#F1F5F9" stroke-width="9"/>
    </g>
    <!-- Status pip (green) in top-right corner — the "admitted" indicator -->
    <circle cx="86" cy="10" r="11" fill="url(#xh-pip)"/>
    <circle cx="86" cy="10" r="6.5" fill="#22C55E"/>
    <circle cx="84.5" cy="8.5" r="2" fill="#BBF7D0"/>
  </g>

  <!-- ============ WORDMARK + MANTRA (left center) ============ -->
  <g transform="translate(192, 0)">
    <!-- x-harness wordmark: "x" in amber, "-harness" in white -->
    <text x="0" y="138"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
          font-size="72" font-weight="900" letter-spacing="-2.5" fill="#F1F5F9">
      <tspan fill="#F59E0B">x</tspan><tspan fill="#F1F5F9">-harness</tspan>
    </text>

    <!-- Mantra: mono caps, tracked, muted -->
    <g transform="translate(2, 170)">
      <!-- Small bracket prefix -->
      <text x="0" y="0"
            font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace"
            font-size="13" font-weight="600" letter-spacing="2" fill="#475569">[</text>
      <text x="14" y="0"
            font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace"
            font-size="13" font-weight="600" letter-spacing="3" fill="#CBD5E1">COMPLETION  IS  ADMITTED,  NOT  CLAIMED</text>
      <text x="498" y="0"
            font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace"
            font-size="13" font-weight="600" letter-spacing="2" fill="#475569">]</text>
    </g>
  </g>

  <!-- ============ VALUE PROP CHIPS (left bottom) ============ -->
  <g transform="translate(192, 200)" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-size="12" font-weight="600">
    <!-- file-first (cyan dot) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="96" height="26" rx="13" fill="#0F172A" stroke="#334155" stroke-width="1"/>
      <circle cx="13" cy="13" r="3" fill="#22D3EE"/>
      <text x="24" y="17" fill="#CBD5E1" letter-spacing="0.4">file-first</text>
    </g>
    <!-- read-only (violet dot) -->
    <g transform="translate(104, 0)">
      <rect x="0" y="0" width="100" height="26" rx="13" fill="#0F172A" stroke="#334155" stroke-width="1"/>
      <circle cx="13" cy="13" r="3" fill="#A78BFA"/>
      <text x="24" y="17" fill="#CBD5E1" letter-spacing="0.4">read-only</text>
    </g>
    <!-- fail-closed (amber dot) -->
    <g transform="translate(212, 0)">
      <rect x="0" y="0" width="108" height="26" rx="13" fill="#0F172A" stroke="#334155" stroke-width="1"/>
      <circle cx="13" cy="13" r="3" fill="#F59E0B"/>
      <text x="24" y="17" fill="#CBD5E1" letter-spacing="0.4">fail-closed</text>
    </g>
    <!-- adapter-agnostic (green dot) -->
    <g transform="translate(328, 0)">
      <rect x="0" y="0" width="148" height="26" rx="13" fill="#0F172A" stroke="#334155" stroke-width="1"/>
      <circle cx="13" cy="13" r="3" fill="#22C55E"/>
      <text x="24" y="17" fill="#CBD5E1" letter-spacing="0.4">adapter-agnostic</text>
    </g>
  </g>

  <!-- ============ CARD PREVIEW (right) ============ -->
  <g transform="translate(768, 56)">
    <!-- Card shadow -->
    <ellipse cx="216" cy="208" rx="180" ry="8" fill="#000" fill-opacity="0.5"/>
    <!-- Card body -->
    <rect x="0" y="0" width="432" height="200" rx="12" fill="url(#xh-card)" stroke="#334155" stroke-width="1"/>

    <!-- Card top bar (filename) -->
    <path d="M 0 12 Q 0 0 12 0 L 420 0 Q 432 0 432 12 L 432 32 L 0 32 Z" fill="#0B1220"/>
    <line x1="0" y1="32" x2="432" y2="32" stroke="#1F2937" stroke-width="1"/>
    <!-- traffic lights -->
    <circle cx="18" cy="16" r="4" fill="#EF4444" fill-opacity="0.55"/>
    <circle cx="32" cy="16" r="4" fill="#F59E0B" fill-opacity="0.55"/>
    <circle cx="46" cy="16" r="4" fill="#22C55E" fill-opacity="0.55"/>
    <!-- filename (centered) -->
    <text x="216" y="20" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace"
          font-size="11" font-weight="500" fill="#94A3B8" letter-spacing="0.5">completion-card.yaml</text>

    <!-- Simulated YAML body -->
    <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-size="12.5">
      <!-- tier -->
      <text x="20" y="62" fill="#64748B">tier:</text>
      <text x="76" y="62" fill="#E2E8F0">standard</text>

      <!-- claim -->
      <text x="20" y="86" fill="#64748B">claim:</text>
      <text x="76" y="86" fill="#E2E8F0">fix_status: <tspan fill="#22C55E" font-weight="700">fixed</tspan></text>

      <!-- verification -->
      <text x="20" y="110" fill="#64748B">verification:</text>
      <text x="124" y="110" fill="#E2E8F0">status: <tspan fill="#22C55E" font-weight="700">passed</tspan></text>

      <!-- admission -->
      <text x="20" y="134" fill="#64748B">admission:</text>
      <text x="120" y="134" fill="#E2E8F0">outcome: <tspan fill="#22C55E" font-weight="700">success</tspan></text>
    </g>

    <!-- Verifier line -->
    <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-size="11.5">
      <text x="20" y="166" fill="#64748B">$</text>
      <text x="32" y="166" fill="#94A3B8">xh</text>
      <text x="58" y="166" fill="#E2E8F0">verify</text>
      <text x="102" y="166" fill="#94A3B8">--card</text>
      <text x="150" y="166" fill="#E2E8F0">completion-card.yaml</text>
    </g>

    <!-- ACCEPTED status badge -->
    <g transform="translate(280, 156)">
      <rect x="0" y="0" width="132" height="26" rx="13" fill="#22C55E" fill-opacity="0.12" stroke="#22C55E" stroke-width="1"/>
      <path d="M 12 13 L 17 18 L 26 9" fill="none" stroke="#22C55E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="18"
            font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
            font-size="11" font-weight="800" letter-spacing="2" fill="#22C55E">ACCEPTED</text>
    </g>
  </g>

  <!-- ============ Bottom-right CLI stamp ============ -->
  <g transform="translate(1216, 298)">
    <text x="0" y="0" text-anchor="end"
          font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Consolas, monospace"
          font-size="10" font-weight="500" fill="#475569" letter-spacing="0.5">$ xh verify →</text>
  </g>
</svg>
