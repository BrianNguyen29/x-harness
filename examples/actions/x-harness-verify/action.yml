name: x-harness Verify
author: x-harness contributors
description: Build x-harness from source and verify a completion card

inputs:
  card-path:
    description: Path to the completion card YAML/JSON
    required: true
    default: completion-card.yaml
  x-harness-ref:
    description: Git ref of x-harness to checkout
    required: false
    default: main
  x-harness-repo:
    description: Repository containing x-harness
    required: false
    default: BrianNguyen29/x-harness
  trace-dir:
    description: Trace directory
    required: false
    default: .x-harness/traces
  trace:
    description: Append verify event to trace
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Checkout x-harness
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: ${{ inputs.x-harness-repo }}
        ref: ${{ inputs.x-harness-ref }}
        path: .x-harness-tool

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: .x-harness-tool/package-lock.json

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: "1.25.9"

    - name: Build x-harness
      shell: bash
      run: |
        cd .x-harness-tool
        npm ci
        npm run build
        go build -o ./x-harness ./cmd/x-harness

    - name: Run x-harness verify (Go-native primary)
      shell: bash
      run: |
        .x-harness-tool/x-harness verify \
          --card "${{ inputs.card-path }}" \
          --trace-dir "${{ inputs.trace-dir }}" \
          ${{ inputs.trace == 'true' && '--trace' || '' }}

    - name: Run x-harness doctor (Go-native primary)
      shell: bash
      run: |
        .x-harness-tool/x-harness doctor --root .

    - name: TypeScript compatibility verify
      shell: bash
      run: |
        node .x-harness-tool/packages/cli/dist/index.js verify \
          --card "${{ inputs.card-path }}" \
          --trace-dir "${{ inputs.trace-dir }}" \
          ${{ inputs.trace == 'true' && '--trace' || '' }}

    - name: TypeScript compatibility doctor
      shell: bash
      run: |
        node .x-harness-tool/packages/cli/dist/index.js doctor --root .
