version: 1

# x-harness Boundary Policy (V1 example)
#
# This file is the default boundary policy used by `xh boundary check`.
# It is intentionally minimal: a small set of example rules that do NOT
# flag the x-harness repository itself. Customise for your repo.
#
# V1 scope (deliberate limit):
#   - Path-glob + import-regex enforcement only.
#   - No AST parser, no semgrep/codeql backend, no LLM.
#   - Severities: info | warning | high | critical.
#   - Actions: deny | require_intermediate | warn.
#
# When this file is missing, `xh boundary check` exits 0 with a warning
# ("no boundary policy loaded"). Boundary enforcement is opt-in.

description: "V1 example boundary policy for the x-harness repo. Marked as example; user must customise for their repo."

boundaries:
  # Example 1: warn when a UI file imports an internal DB package.
  # This rule does NOT match any file in x-harness today (no src/ui/
  # directory exists). It exists to demonstrate the deny action with a
  # non-trivial pattern; users with a real src/ui/ tree should adapt
  # the glob to match their layout.
  - id: ui-cannot-access-db
    description: "UI files must not import internal database packages directly."
    from: "src/ui/**"
    to_import: "internal/db/**"
    action: deny
    severity: warning
    applies_to_languages: [typescript, javascript]
    allow:
      - "internal/db/public/**"

  # Example 2: warn when top-level scripts reach into private internal
  # packages. x-harness scripts/*.mjs only import node: built-ins, so this
  # rule does not match the current repo; it surfaces leakage patterns
  # for users who add new build/automation scripts.
  - id: scripts-no-internal-private
    description: "Top-level scripts must not import private internal packages."
    from: "scripts/**"
    to_import: "internal/*/private/**"
    action: warn
    severity: info
    applies_to_languages: [typescript, javascript, go]

  # Example 3: require_intermediate for an app -> data boundary. The
  # `intermediate` glob represents a service/port module that mediates
  # access. x-harness has no apps/ tree today, so this rule is a no-op
  # for the current repo and demonstrates the require_intermediate
  # action.
  - id: app-via-service
    description: "App code must reach the data layer through a service module."
    from: "apps/**"
    to_import: "internal/data/**"
    action: require_intermediate
    intermediate: "internal/services/**"
    severity: warning
    applies_to_languages: [typescript, javascript, go]
    allow:
      - "internal/services/**"
