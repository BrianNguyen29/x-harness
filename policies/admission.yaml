version: 1

candidate_completion:
  required:
    - schema_version
    - task_id
    - tier
    - owner
    - accountable
    - claim.fix_status
    - verification.status
    - claim.evidence
    - handoff.next_action
    - handoff.owner

success_requires:
  - claim.fix_status == fixed
  - verification.status == passed
  - admission.outcome == success
  - acceptance_status == accepted
  - claim.evidence present and non-empty
  - owner.present == true
  - accountable.present == true
  - evidence_floor_met
  - admission_mapping_valid
  - no_unresolved_blocker
  - no_active_recovery
  - verifier_read_only

evidence_floor:
  light:
    required:
      - files_changed
    one_of:
      - command_evidence
      - manual_rationale

  standard:
    required:
      - files_changed
      - command_evidence
    recommended:
      - evidence_scope_declared
      - untested_regions_declared

  deep:
    required:
      - files_changed
      - command_evidence
      - evidence_scope_declared
      - untested_regions_declared
      - remaining_risks_declared
      - execution_controls_present
      - rollback_policy_present

reject_success_if:
  fix_status:
    - partial
    - not_fixed

  verification_status:
    - failed
    - skipped
    - blocked

  evidence_quality:
    - missing
    - weak

  approval_required_but_missing: true
  timeout: true
  error: true

outcome_mapping:
  success:
    acceptance_status: accepted
  failed:
    acceptance_status: withheld
  blocked:
    acceptance_status: withheld
  skipped:
    acceptance_status: withheld
  timeout:
    acceptance_status: withheld
  error:
    acceptance_status: withheld

blocked_requires:
  handoff:
    next_action: present
    owner: present

withheld_requires:
  handoff:
    next_action: present
    owner: present
