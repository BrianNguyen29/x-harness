version: 1

candidate_completion:
  required:
    - schema_version
    - task_id
    - tier
    - owner
    - accountable
    - claim.fix_status
    - verification.status
    - claim.evidence
    - handoff.next_action
    - handoff.owner

success_requires:
  - claim.fix_status == fixed
  - verification.status == passed
  - admission.outcome == success
  - acceptance_status == accepted
  - claim.evidence present and non-empty
  - owner.present == true
  - accountable.present == true
  - evidence_floor_met
  - admission_mapping_valid
  - no_unresolved_blocker
  - no_active_recovery
  - verifier_read_only
  - done_checklist_present_for_standard_or_deep
  - prediction_present_for_standard_or_deep

evidence_floor:
  light:
    required:
      - files_changed
    one_of:
      - command_evidence
      - manual_rationale

  standard:
    required:
      - files_changed
      - command_evidence
      - done_checklist
      - prediction
    recommended:
      - evidence_scope_declared
      - untested_regions_declared

  deep:
    required:
      - files_changed
      - command_evidence
      - evidence_scope_declared
      - untested_regions_declared
      - remaining_risks_declared
      - execution_controls_present
      - rollback_policy_present
      - done_checklist
      - prediction
    runtime_enforced:
      - verification_artifacts
      - state.read_set
      - state.write_set

reject_success_if:
  fix_status:
    - partial
    - not_fixed

  verification_status:
    - failed
    - skipped
    - blocked

  evidence_quality:
    - missing
    - weak

  approval_required_but_missing: true
  timeout: true
  error: true

outcome_mapping:
  success:
    acceptance_status: accepted
  failed:
    acceptance_status: withheld
  blocked:
    acceptance_status: withheld
  skipped:
    acceptance_status: withheld
  timeout:
    acceptance_status: withheld
  error:
    acceptance_status: withheld

blocked_requires:
  handoff:
    next_action: present
    owner: present

withheld_requires:
  handoff:
    next_action: present
    owner: present

# Advisory-only product intent status. Never blocks admission in the first slice.
# Emission rules:
#   - standard/deep missing product_intent.status -> advisory note
#   - standard/deep product_intent.status == "unknown" -> advisory note
#   - light tier -> no note (advisory remains quiet)
#   - aligned / unreviewed / disputed / not_applicable -> no special note
# The note wording makes it explicit that admission acceptance is not product
# correctness; follow-up slices may add blocking intent gates.
advisory_intent:
  product_intent_status:
    - aligned
    - unreviewed
    - disputed
    - unknown
    - not_applicable
  missing_note: "product_intent.status not declared (advisory-only; admission acceptance is not product correctness)"
  unknown_note: "product_intent.status is unknown (advisory-only; admission acceptance is not product correctness)"
  emit_for_tiers:
    - standard
    - deep
  quiet_for_tiers:
    - light
  blocks_admission: false

# Advisory-only test adequacy declaration. Never blocks admission in the first
# slice. test_adequacy is an optional top-level object with optional
# impacted_behaviors, tests_selected, why_sufficient, known_gaps, notes.
# Emission rules:
#   - standard/deep missing test_adequacy -> top-level missing note
#   - standard/deep missing/empty impacted_behaviors -> impacted_behaviors note
#   - standard/deep missing/empty tests_selected -> tests_selected note
#   - standard/deep missing/blank why_sufficient -> why_sufficient note
#   - deep missing known_gaps -> known_gaps note (explicit [] is accepted)
#   - light tier -> no note (advisory remains quiet)
# The note wording makes it explicit that admission acceptance is not test
# adequacy; follow-up slices may add blocking adequacy gates.
advisory_test_adequacy:
  properties:
    - impacted_behaviors
    - tests_selected
    - why_sufficient
    - known_gaps
  missing_note: "test_adequacy not declared (advisory-only; admission acceptance is not test adequacy)"
  impacted_behaviors_missing_note: "test_adequacy.impacted_behaviors not declared (advisory-only; consider listing behavior covered by tests)"
  tests_selected_missing_note: "test_adequacy.tests_selected not declared (advisory-only; consider listing selected tests)"
  why_sufficient_missing_note: "test_adequacy.why_sufficient not declared (advisory-only; consider explaining why tests are sufficient)"
  known_gaps_missing_note: "test_adequacy.known_gaps not declared (advisory-only; deep should list gaps or set [])"
  emit_for_tiers:
    - standard
    - deep
  deep_known_gaps_required: true
  quiet_for_tiers:
    - light
  blocks_admission: false
