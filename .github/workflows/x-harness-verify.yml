name: x-harness Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: x-harness-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: typecheck
            command: npm run typecheck
          - name: test-typecheck
            command: npm run test:typecheck
          - name: build
            command: npm run build
          - name: lint
            command: npm run lint
          - name: format
            command: npm run format:check
          - name: test
            command: npm run build && npm run test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: ${{ matrix.command }}

  go-quality:
    name: go-quality / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: test
            command: go test ./...
          - name: race
            command: go test -race ./...
          - name: vet
            command: go vet ./...
          - name: build
            command: go build ./cmd/x-harness
          - name: parity
            command: npm run parity:check-go
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.9"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: matrix.name == 'parity'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: matrix.name == 'parity'
      - run: ${{ matrix.command }}

  go-fuzz-smoke:
    name: go-fuzz-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.9"
      - name: FuzzValidate
        run: go test -fuzz=FuzzValidate -fuzztime=10s ./internal/schema
      - name: FuzzLoadDocument
        run: go test -fuzz=FuzzLoadDocument -fuzztime=10s ./internal/loader
      - name: FuzzRun
        run: go test -fuzz=FuzzRun -fuzztime=10s ./internal/admission
      - name: FuzzExplainCardIntake
        run: go test -fuzz=FuzzExplainCardIntake -fuzztime=10s ./internal/intake

  verify-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.9"
      - run: npm ci
      - run: npm run cli-metadata:check
      - run: npm run build
      - run: go build -o ./x-harness ./cmd/x-harness
      - name: Go-native policy matrix
        run: ./x-harness policy matrix --json
      - name: Go-native strict verify gate
        run: ./x-harness verify --card examples/ci/strict-verify/completion-card.yaml --strict --json
      - name: Go-native verify profile gate (ci-standard)
        run: ./x-harness verify --profile ci-standard --card examples/ci/strict-verify/completion-card.yaml --json
      - name: Go-native verify profile gate (governed-deep)
        run: ./x-harness verify --profile governed-deep --card examples/ci/governed-deep-verify/completion-card.yaml --json
      - name: Go-native policy explain gate
        run: ./x-harness policy explain admission.evidence_floor --json
      - name: Go-native explain card gate
        run: ./x-harness explain --card examples/ci/strict-verify/completion-card.yaml --json
      - name: Go-native evidence run gate
        run: ./x-harness evidence run -- echo phase1-gate
      - name: Go-native workspace doctor
        run: ./x-harness doctor --root . --json
      - name: "TypeScript compatibility: strict verify"
        run: node packages/cli/dist/index.js verify --card examples/ci/strict-verify/completion-card.yaml --strict --json
      - name: "TypeScript compatibility: governed-deep verify"
        run: node packages/cli/dist/index.js verify --card examples/ci/governed-deep-verify/completion-card.yaml --profile governed-deep --json
      - name: "TypeScript compatibility: workspace doctor"
        run: node packages/cli/dist/index.js doctor --root .
