name: x-harness Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: quality / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: typecheck
            command: npm run typecheck
          - name: build
            command: npm run build
          - name: lint
            command: npm run lint
          - name: format
            command: npm run format:check
          - name: test
            command: npm run build && npm run test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: ${{ matrix.command }}

  verify-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node packages/cli/dist/index.js verify --card examples/ci/strict-verify/completion-card.yaml --strict --json
      - run: node packages/cli/dist/index.js doctor --root .
      - run: node packages/cli/dist/index.js examples verify
      - run: node packages/cli/dist/index.js benchmark --filter adversarial --json
