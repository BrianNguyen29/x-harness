name: Branch Discipline

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  direct-push-guard:
    name: direct-push-guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check for direct push to main
        run: |
          PARENT_COUNT=$(($(git rev-list --parents -n 1 HEAD | wc -w) - 1))
          if [ "$PARENT_COUNT" -ge 2 ]; then
            echo "Merge commit detected. PR merge path allowed."
            exit 0
          fi
          echo "ERROR: Direct push to main detected."
          echo "All changes to main must go through a pull request."
          exit 1
