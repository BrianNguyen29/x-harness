name: SLSA Provenance Starter

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Build Go binary
        run: go build -o ./x-harness ./cmd/x-harness
      - name: Generate checksum
        id: hash
        run: |
          set -euo pipefail
          echo "hashes=$(sha256sum ./x-harness | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: x-harness-binary
          path: |
            ./x-harness

  # Exception: the slsa-framework/slsa-github-generator reusable workflow MUST be
  # referenced by a full semver tag (@vX.Y.Z) for slsa-verifier compatibility.
  # A commit SHA breaks consumer verification. All other third-party actions in this
  # repository remain pinned by SHA. The tag below was audited against commit
  # f7dd8c54c2067bafc12ca7a55595d5ee9b75204a via the project's GitHub release page.
  # See docs/RELEASE_SECURITY.md for the scoped ADR.
  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
      provenance-name: "slsa-attestation.intoto.jsonl"
