name: SLSA Provenance Starter

on:
  workflow_dispatch:
  # Enable on release when the SLSA generator pin is confirmed:
  # release:
  #   types: [created]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.9"
      - name: Build Go binary
        run: go build -o ./x-harness ./cmd/x-harness
      - name: Generate checksum
        id: hash
        run: |
          set -euo pipefail
          echo "hashes=$(sha256sum ./x-harness | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: x-harness-binary
          path: |
            ./x-harness

  # To complete SLSA Level 3 provenance, add a provenance job that calls the
  # slsa-framework generator. Before enabling, pin the reusable workflow to a
  # verified SHA and ensure the release workflow uploads the same artifacts.
  #
  # Provenance pin verification steps:
  # 1. Visit https://github.com/slsa-framework/slsa-github-generator/releases
  # 2. Copy the full commit SHA of the desired release.
  # 3. Verify the SHA via an independent channel (e.g., sigstore certificate or
  #    the project's documented release notes).
  # 4. Replace <PINNED_SHA> below with the verified SHA.
  # 5. Uncomment the provenance job and enable the release trigger above.
  # 6. Run this workflow from a test tag to confirm artifact hashes match.
  #
  # provenance:
  #   needs: [build]
  #   permissions:
  #     actions: read
  #     id-token: write
  #     contents: write
  #   uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@<PINNED_SHA>
  #   with:
  #     base64-subjects: "${{ needs.build.outputs.hashes }}"
  #     upload-assets: true
  #     provenance-name: "slsa-attestation.intoto.jsonl"
