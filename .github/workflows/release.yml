name: x-harness Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

      - name: Strict verify gate
        run: node packages/cli/dist/index.js verify --card examples/ci/strict-verify/completion-card.yaml --strict --json

      - name: Workspace doctor
        run: node packages/cli/dist/index.js doctor --root .

      - name: Golden examples
        run: node packages/cli/dist/index.js examples verify

      - name: Adversarial benchmark gate
        run: node packages/cli/dist/index.js benchmark --filter adversarial --json > benchmark-report.json

      - name: npm pack dry run
        run: npm -w packages/cli run pack:dry-run

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Go parity check
        run: npm run parity:check-go

      - name: Build Go release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .x-harness/release/go-binaries
          VERSION="${GITHUB_REF_NAME:-dev}"
          PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          for p in "${PLATFORMS[@]}"; do
            GOOS="${p%%/*}"
            GOARCH="${p##*/}"
            OUT="x-harness-${VERSION}-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              OUT="${OUT}.exe"
            fi
            echo "Building $p -> $OUT"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags "-s -w -X main.version=${VERSION}" -o ".x-harness/release/go-binaries/$OUT" ./cmd/x-harness
          done

      - name: Generate Go binary checksums
        shell: bash
        run: |
          set -euo pipefail
          cd .x-harness/release/go-binaries
          sha256sum x-harness-* > checksums.txt

      - name: Go binary smoke test
        shell: bash
        run: |
          set -euo pipefail
          bash tests/smoke/go-binary-smoke.sh .x-harness/release/go-binaries/x-harness-*-linux-amd64

      - uses: sigstore/cosign-installer@v3.7.0

      - name: Sign Go binaries with cosign
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          for bin in .x-harness/release/go-binaries/x-harness-*; do
            if [ -f "$bin" ] && [ ! -f "$bin.sig" ]; then
              cosign sign-blob --yes \
                --output-signature "${bin}.sig" \
                --output-certificate "${bin}.pem" \
                "$bin"
            fi
          done

      - name: Copy Go binaries into npm package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p packages/cli/go-binaries
          for f in .x-harness/release/go-binaries/x-harness-*; do
            if [ -f "$f" ]; then
              cp "$f" packages/cli/go-binaries/
            fi
          done
          cp .x-harness/release/go-binaries/checksums.txt packages/cli/go-binaries/ || true

      - name: Build release package
        run: |
          mkdir -p .x-harness/release
          npm pack --workspace x-harness --pack-destination .x-harness/release --json > .x-harness/release/npm-pack.json

      - name: Generate SBOM
        run: npm sbom --workspace x-harness --sbom-format cyclonedx --sbom-type application > .x-harness/release/sbom.cdx.json

      - name: Packed CLI smoke test
        shell: bash
        run: |
          set -euo pipefail
          PACK_FILE="$(find "$PWD/.x-harness/release" -name 'x-harness-*.tgz' -print -quit)"
          TMP_REPO="$(mktemp -d)"
          (cd "$TMP_REPO" && npm init -y)
          npm --prefix "$TMP_REPO" install "$PACK_FILE"
          "$TMP_REPO/node_modules/.bin/xh" init "$TMP_REPO/harness" --minimal
          test -f "$TMP_REPO/harness/AGENTS.md"
          cp "$PWD/examples/00-minimal/completion-card.yaml" "$TMP_REPO/harness/completion-card.yaml"
          "$TMP_REPO/node_modules/.bin/xh" verify --card "$TMP_REPO/harness/completion-card.yaml" --json
          "$TMP_REPO/node_modules/.bin/xh" doctor --root "$PWD"

      - name: Packed CLI Go smoke test
        shell: bash
        run: |
          set -euo pipefail
          PACK_FILE="$(find "$PWD/.x-harness/release" -name 'x-harness-*.tgz' -print -quit)"
          TMP_REPO="$(mktemp -d)"
          (cd "$TMP_REPO" && npm init -y)
          npm --prefix "$TMP_REPO" install "$PACK_FILE"
          X_HARNESS_GO=1 "$TMP_REPO/node_modules/.bin/xh" --version
          X_HARNESS_GO=1 "$TMP_REPO/node_modules/.bin/xh" doctor --root "$PWD" --json >/dev/null
          X_HARNESS_GO=1 "$TMP_REPO/node_modules/.bin/xh" examples verify --json >/dev/null
          X_HARNESS_GO=1 "$TMP_REPO/node_modules/.bin/xh" verify --card "$PWD/examples/golden/success-light/completion-card.yaml" --json >/dev/null

      - name: Frozen transfer compatibility
        shell: bash
        run: |
          set -euo pipefail
          PACK_FILE="$(find "$PWD/.x-harness/release" -name 'x-harness-*.tgz' -print -quit)"
          TMP_REPO="$(mktemp -d)"
          (cd "$TMP_REPO" && npm init -y)
          npm --prefix "$TMP_REPO" install "$PACK_FILE"
          "$TMP_REPO/node_modules/.bin/xh" export --frozen --root "$PWD" --out "$TMP_REPO/x-harness-frozen.tar.gz" --json
          "$TMP_REPO/node_modules/.bin/xh" frozen verify "$TMP_REPO/x-harness-frozen.tar.gz" --json
          "$TMP_REPO/node_modules/.bin/xh" import "$TMP_REPO/x-harness-frozen.tar.gz" --frozen --target "$TMP_REPO/frozen-target" --merge --json
          "$TMP_REPO/node_modules/.bin/xh" doctor --root "$TMP_REPO/frozen-target"

      - uses: actions/upload-artifact@v4
        with:
          name: x-harness-release-artifacts
          path: |
            benchmark-report.json
            .x-harness/release/**

      - name: Publish to npm with provenance
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --workspace x-harness --provenance --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  cross-platform-smoke:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: x-harness-release-artifacts
          path: .x-harness/release
      - name: Note on arm64 build-vs-smoke gap
        shell: bash
        run: |
          echo "Note: arm64 binaries are built (linux/arm64, darwin/arm64, windows/arm64) but are not smoke-tested here."
          echo "Cross-platform smoke currently covers amd64 only because arm64 runners are not universally available."

      - name: Smoke test on ${{ matrix.os }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          case "${{ matrix.os }}" in
            ubuntu-latest)
              BIN=".x-harness/release/go-binaries/x-harness-${VERSION}-linux-amd64"
              ;;
            macos-latest)
              BIN=".x-harness/release/go-binaries/x-harness-${VERSION}-darwin-amd64"
              ;;
            windows-latest)
              BIN=".x-harness/release/go-binaries/x-harness-${VERSION}-windows-amd64.exe"
              ;;
          esac
          chmod +x "$BIN"
          bash tests/smoke/go-binary-smoke.sh "$BIN"
