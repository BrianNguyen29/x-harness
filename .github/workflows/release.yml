name: x-harness Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run in dry-run mode (no publish/sign/upload)"
        type: boolean
        required: false
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"

      - run: npm ci
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          test "$ROOT_VERSION" = "$PKG_VERSION"
          test "${GITHUB_REF_NAME}" = "v${PKG_VERSION}"
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

      - name: Build Go CLI
        run: go build -o ./x-harness ./cmd/x-harness

      - name: Go-native strict verify gate
        run: ./x-harness verify --card examples/ci/strict-verify/completion-card.yaml --strict --json

      - name: Go-native workspace doctor
        run: ./x-harness doctor --root . --json

      - name: Go-native golden examples
        run: ./x-harness examples verify --json

      - name: Go-native adversarial benchmark gate
        run: ./x-harness benchmark --filter adversarial --gate --json > benchmark-report.json

      - name: Go-native regression suite gate
        run: ./x-harness examples verify --suite=regression --json

      - name: Go-native conformance minimal gate
        run: ./x-harness conformance run --profile minimal --json

      - name: Go-native conformance strict gate
        run: ./x-harness conformance run --profile strict --json

      - name: npm pack dry run
        run: npm -w packages/cli run pack:dry-run

      - name: Go test
        run: go test ./...

      - name: Go test race
        run: go test -race ./...

      - name: Go vet
        run: go vet ./...

      - name: Go parity check
        run: npm run parity:check-go

      - name: Build Go release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .x-harness/release/go-binaries
          VERSION="${GITHUB_REF_NAME:-dev}"
          PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          for p in "${PLATFORMS[@]}"; do
            GOOS="${p%%/*}"
            GOARCH="${p##*/}"
            OUT="x-harness-${VERSION}-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              OUT="${OUT}.exe"
            fi
            echo "Building $p -> $OUT"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags "-s -w -X main.version=${VERSION}" -o ".x-harness/release/go-binaries/$OUT" ./cmd/x-harness
          done

      - name: Generate Go binary checksums
        shell: bash
        run: |
          set -euo pipefail
          cd .x-harness/release/go-binaries
          sha256sum x-harness-* > checksums.txt

      - name: Generate Scoop manifest
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p .x-harness/release/scoop
          bash scripts/generate-scoop-manifest.sh "$VERSION" .x-harness/release/go-binaries/checksums.txt > .x-harness/release/scoop/x-harness.json

      - name: Go binary smoke test
        shell: bash
        run: |
          set -euo pipefail
          export VERSION="${GITHUB_REF_NAME:-dev}"
          bash tests/smoke/go-binary-smoke.sh .x-harness/release/go-binaries/x-harness-*-linux-amd64

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Go binaries with cosign
        if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry-run
        shell: bash
        run: |
          set -euo pipefail
          for bin in .x-harness/release/go-binaries/x-harness-*; do
            if [ -f "$bin" ] && [ ! -f "$bin.sig" ]; then
              cosign sign-blob --yes \
                --output-signature "${bin}.sig" \
                --output-certificate "${bin}.pem" \
                "$bin"
            fi
          done

      - name: Copy Go binaries into npm package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p packages/cli/go-binaries
          for f in .x-harness/release/go-binaries/x-harness-*; do
            if [ -f "$f" ]; then
              cp "$f" packages/cli/go-binaries/
              basename_f=$(basename "$f")
              if [[ "$basename_f" =~ ^x-harness-.*-(linux|darwin|windows)-(amd64|arm64)(\.exe)?$ ]]; then
                unversioned="x-harness-${BASH_REMATCH[1]}-${BASH_REMATCH[2]}${BASH_REMATCH[3]}"
                cp "$f" "packages/cli/go-binaries/$unversioned"
              fi
            fi
          done
          cp .x-harness/release/go-binaries/checksums.txt packages/cli/go-binaries/ || true

      - name: Build release package
        run: |
          mkdir -p .x-harness/release
          npm pack --workspace x-harness --pack-destination .x-harness/release --json > .x-harness/release/npm-pack.json

      - name: Generate SBOM
        run: npm sbom --workspace x-harness --sbom-format cyclonedx --sbom-type application > .x-harness/release/sbom.cdx.json

      - name: Generate Go module SBOM source
        run: go list -m -json all > .x-harness/release/go-modules.sbom.json

      - name: Generate Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          bash scripts/generate-homebrew-formula.sh "$VERSION" .x-harness/release/go-binaries/checksums.txt > .x-harness/release/x-harness.rb
          echo "Generated Homebrew formula:"
          cat .x-harness/release/x-harness.rb

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd .x-harness/release
          find . -type f ! -name 'release-checksums.txt' -print0 | xargs -0 sha256sum > release-checksums.txt
          cd ../..
          sha256sum benchmark-report.json >> .x-harness/release/release-checksums.txt

      - name: Packed CLI smoke test (default Go path)
        shell: bash
        run: |
          set -euo pipefail
          PACK_FILE="$(find "$PWD/.x-harness/release" -name 'x-harness-*.tgz' -print -quit)"
          TMP_REPO="$(mktemp -d)"
          tar -xzf "$PACK_FILE" -C "$TMP_REPO"
          PACKAGED_CLI="$TMP_REPO/package/bin/x-harness.js"
          node "$PACKAGED_CLI" init "$TMP_REPO/harness" --minimal
          test -f "$TMP_REPO/harness/AGENTS.md"
          cp "$PWD/examples/00-minimal/completion-card.yaml" "$TMP_REPO/harness/completion-card.yaml"
          node "$PACKAGED_CLI" verify --card "$TMP_REPO/harness/completion-card.yaml" --json
          node "$PACKAGED_CLI" doctor --root "$PWD"

      - name: Packed CLI Go smoke test (forced Go path)
        shell: bash
        run: |
          set -euo pipefail
          PACK_FILE="$(find "$PWD/.x-harness/release" -name 'x-harness-*.tgz' -print -quit)"
          TMP_REPO="$(mktemp -d)"
          tar -xzf "$PACK_FILE" -C "$TMP_REPO"
          PACKAGED_CLI="$TMP_REPO/package/bin/x-harness.js"
          X_HARNESS_GO=1 node "$PACKAGED_CLI" --version
          X_HARNESS_GO=1 node "$PACKAGED_CLI" doctor --root "$PWD" --json >/dev/null
          X_HARNESS_GO=1 node "$PACKAGED_CLI" examples verify --json >/dev/null
          X_HARNESS_GO=1 node "$PACKAGED_CLI" verify --card "$PWD/examples/golden/regression/success-light/completion-card.yaml" --json >/dev/null

      - name: Frozen transfer compatibility
        shell: bash
        run: |
          set -euo pipefail
          PACK_FILE="$(find "$PWD/.x-harness/release" -name 'x-harness-*.tgz' -print -quit)"
          TMP_REPO="$(mktemp -d)"
          tar -xzf "$PACK_FILE" -C "$TMP_REPO"
          PACKAGED_CLI="$TMP_REPO/package/bin/x-harness.js"
          node "$PACKAGED_CLI" export --frozen --root "$PWD" --out "$TMP_REPO/x-harness-frozen.tar.gz" --json
          node "$PACKAGED_CLI" frozen verify "$TMP_REPO/x-harness-frozen.tar.gz" --json
          node "$PACKAGED_CLI" import "$TMP_REPO/x-harness-frozen.tar.gz" --frozen --target "$TMP_REPO/frozen-target" --merge --json
          node "$PACKAGED_CLI" doctor --root "$TMP_REPO/frozen-target"

      - name: Go-native frozen transfer compatibility
        shell: bash
        run: |
          set -euo pipefail
          TMP_REPO="$(mktemp -d)"
          ./x-harness export --frozen --root "$PWD" --out "$TMP_REPO/x-harness-frozen.tar.gz" --json
          ./x-harness frozen verify "$TMP_REPO/x-harness-frozen.tar.gz" --json
          ./x-harness import "$TMP_REPO/x-harness-frozen.tar.gz" --frozen --target "$TMP_REPO/frozen-target" --merge --json
          ./x-harness doctor --root "$TMP_REPO/frozen-target"

      - name: "TypeScript compatibility: strict verify"
        run: node packages/cli/dist/index.js verify --card examples/ci/strict-verify/completion-card.yaml --strict --json

      - name: "TypeScript compatibility: workspace doctor"
        run: node packages/cli/dist/index.js doctor --root .

      - name: "TypeScript compatibility: golden examples"
        run: node packages/cli/dist/index.js examples verify

      - name: "TypeScript compatibility: adversarial benchmark"
        run: node packages/cli/dist/index.js benchmark --filter adversarial --gate --json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: x-harness-release-artifacts
          path: |
            benchmark-report.json
            .x-harness/release/**

  cross-platform-smoke:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: x-harness-release-artifacts
          path: .
      - name: Smoke test on ${{ matrix.os }}
        shell: bash
        run: |
          set -euo pipefail
          export VERSION="${GITHUB_REF_NAME:-dev}"
          case "${{ matrix.os }}" in
            ubuntu-latest)
              BIN=".x-harness/release/go-binaries/x-harness-${VERSION}-linux-amd64"
              ;;
            macos-latest)
              BIN=".x-harness/release/go-binaries/x-harness-${VERSION}-darwin-amd64"
              ;;
            windows-latest)
              BIN=".x-harness/release/go-binaries/x-harness-${VERSION}-windows-amd64.exe"
              ;;
          esac
          chmod +x "$BIN"
          bash tests/smoke/go-binary-smoke.sh "$BIN"

  arm64-smoke:
    needs: release
    name: arm64-smoke / ubuntu-24.04-arm
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: x-harness-release-artifacts
          path: .
      - name: Smoke test on ubuntu-24.04-arm
        shell: bash
        run: |
          set -euo pipefail
          export VERSION="${GITHUB_REF_NAME:-dev}"
          BIN=".x-harness/release/go-binaries/x-harness-${VERSION}-linux-arm64"
          chmod +x "$BIN"
          bash tests/smoke/go-binary-smoke.sh "$BIN"

  publish:
    needs: [cross-platform-smoke, arm64-smoke]
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry-run
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: x-harness-release-artifacts
          path: .
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Attach release artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" --title "Release $VERSION" --generate-notes
          fi
          for f in .x-harness/release/go-binaries/x-harness-*; do
            if [ -f "$f" ]; then
              gh release upload "$VERSION" "$f" --clobber
            fi
          done
          gh release upload "$VERSION" .x-harness/release/go-binaries/checksums.txt --clobber
          gh release upload "$VERSION" .x-harness/release/sbom.cdx.json --clobber
          gh release upload "$VERSION" .x-harness/release/go-modules.sbom.json --clobber
          gh release upload "$VERSION" .x-harness/release/npm-pack.json --clobber
          gh release upload "$VERSION" .x-harness/release/release-checksums.txt --clobber
          gh release upload "$VERSION" benchmark-report.json --clobber
          if [ -f ".x-harness/release/scoop/x-harness.json" ]; then
            gh release upload "$VERSION" .x-harness/release/scoop/x-harness.json --clobber
          fi
          if [ -f ".x-harness/release/x-harness.rb" ]; then
            gh release upload "$VERSION" .x-harness/release/x-harness.rb --clobber
          fi
          TARBALL="$(find "$PWD/.x-harness/release" -maxdepth 1 -name 'x-harness-*.tgz' -print -quit)"
          test -n "$TARBALL"
          gh release upload "$VERSION" "$TARBALL" --clobber
      - name: Publish to npm with provenance
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(find "$PWD/.x-harness/release" -maxdepth 1 -name 'x-harness-*.tgz' -print -quit)"
          test -n "$TARBALL"
          npm publish "$TARBALL" --provenance --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
